name: ARD Runtime v4

on:
  pull_request:
    paths:
      - "runtime/**"
      - "schema/*runtime*"
      - "schema/runtime-run-evidence.schema.json"
      - "schema/evidence-summary.schema.json"
      - "tests/test_v4_schema.py"
      - "tests/test_runtime_*.py"
      - "tests/test_evidence_projection.py"
      - "scripts/runtime_evidence.py"
      - ".github/workflows/arde-runtime-v4.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  runtime-v4:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install focused test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema
      - name: Run v4 focused tests
        run: >-
          python -m pytest
          tests/test_v4_schema.py
          tests/test_runtime_ledger.py
          tests/test_runtime_executor.py
          tests/test_runtime_orchestrator.py
          tests/test_runtime_policy.py
          tests/test_runtime_recovery.py
          tests/test_evidence_projection.py
          tests/test_runtime_evidence_cli.py
          -q -p no:cacheprovider
      - name: Run repository regression suite
        run: python -m pytest tests/ -q -p no:cacheprovider
