name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  validate-json:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema

      - name: Validate JSON files
        run: |
          for file in schema/*.json analysis/*.json; do
            if [ -f "$file" ]; then
              echo "Validating $file..."
              python -m json.tool "$file" > /dev/null
            fi
          done
          echo "Schema and analysis JSON files are structurally valid."
          python tools/validate_skill_schema.py parsed
          echo "All JSON files are valid and schema-compliant!"

  docs-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate document status markers
        run: python tools/check_doc_status_markers.py

      - name: Validate shared-doc source set
        run: python tools/check_shared_docs.py

  compile-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile check all Python
        run: |
          python -m compileall api/ vector_db/ tools/ skill-0-dashboard/apps/api/ -q

  test-python:
    runs-on: ubuntu-latest
    needs: compile-check
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch/sentence_transformers
          key: ${{ runner.os }}-skill0-embeddings-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Warm embedding model cache
        env:
          SKILL0_DEVICE: "cpu"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          from sentence_transformers import SentenceTransformer

          SentenceTransformer("all-MiniLM-L6-v2", device="cpu")
          print("Embedding model cache ready")
          PY

      - name: Run tests
        env:
          SKILL0_DEVICE: "cpu"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pytest tests skill-0-dashboard/apps/api/tests -v --timeout=120 --cov=api --cov=vector_db --cov=tools --cov=skill-0-dashboard/apps/api --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=75

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: skill-0-dashboard/apps/web/package-lock.json

      - name: Install dependencies
        working-directory: skill-0-dashboard/apps/web
        run: npm ci

      - name: Lint
        working-directory: skill-0-dashboard/apps/web
        run: npm run lint

      - name: Test
        working-directory: skill-0-dashboard/apps/web
        run: npm test

      - name: Build
        working-directory: skill-0-dashboard/apps/web
        run: npm run build:ci

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t skill-0-api:test .

      - name: Build Dashboard image
        run: docker build -f Dockerfile.dashboard -t skill-0-dashboard:test .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t skill-0-web:test .
