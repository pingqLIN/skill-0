services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8000"
    env_file:
      - path: .env
        required: false
    environment:
      SKILL0_RUNTIME_DB_PATH: /app/runtime-data/runtime.db
      SKILL0_GOVERNANCE_DB_PATH: /app/governance/db/governance.db
      SKILL0_RUNTIME_HITL_TTL_SECONDS: ${SKILL0_RUNTIME_HITL_TTL_SECONDS:-86400}
      SKILL0_RUNTIME_JOURNAL_MODE: WAL
    volumes:
      - ./api:/app/api
      - ./vector_db:/app/vector_db
      - ./parsed:/app/parsed
      - ./schema:/app/schema
      - ./skills.db:/app/skills.db
      - ./governance:/app/governance:ro
      - runtime-data:/app/runtime-data
      - model-cache:/app/.cache
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      SKILL0_TOOLS_PATH: /app/tools
    volumes:
      - ./skill-0-dashboard/apps/api:/app/api
      - ./tools:/app/tools
      - ./governance:/app/governance
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:8080"
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

volumes:
  model-cache:
  runtime-data:
