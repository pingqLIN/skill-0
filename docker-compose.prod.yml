# Production compose file — usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-8080}:8000"
    env_file:
      - path: .env
        required: true
    environment:
      SKILL0_ENV: production
      SKILL0_ENABLE_DOCS: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to the production origin list}
      SKILL0_DB_PATH: /app/data/skills.db
    volumes:
      - skill0-skills-db:/app/data
      - model-cache:/app/.cache
    restart: always
    mem_limit: 1g
    cpus: 1.0

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    env_file:
      - path: .env
        required: true
    environment:
      SKILL0_ENV: production
      SKILL0_ENABLE_DOCS: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to the production origin list}
      SKILL0_TOOLS_PATH: /app/tools
      SKILL0_GOVERNANCE_DB_PATH: /app/governance/db/governance.db
    volumes:
      - skill0-governance-db:/app/governance/db
    restart: always
    mem_limit: 256m
    cpus: 0.5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "${WEB_PORT:-3080}:8080"
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    restart: always
    mem_limit: 128m
    cpus: 0.25

volumes:
  model-cache:
  skill0-skills-db:
  skill0-governance-db:
